<div class="jsf-tabstrip panel panel-default panel-tabbed">
  <div class="panel-heading">
    <div class="panel-title">
      {{title()}}
    </div>
    <ul class="nav nav-tabs">
      @for (tab of tabs; track tab.dataItem().key; let i = $index) {
        <li class="clickable" (click)="onTabClicked(tab)" [class.active]="tab.selected()" [class.disabled]="isDisabled(tab)" [class.has-error]="!isValid(tab) && !isDisabled(tab)">
          <a>{{tab.dataItem().label}}@if (tabHasRequiredFields(tab)) {
            <span class="required-star">*</span>
          }</a>
        </li>
      }
    </ul>
    @if (selectedTab?.dataItem()?.description) {
      <div class="tab-description">
        <span>{{selectedTab.dataItem().description}}</span>
        @if (selectedTab.dataItem().helpText) {
          <img
            class="help"
            alt="info"
            [title]="selectedTab.dataItem().helpText"
            [src]="'assets/jsf-images/info.svg'">
        }
      </div>
    }
  </div>
    <div class="panel-body">
      <ng-content></ng-content>
    </div>
  </div>

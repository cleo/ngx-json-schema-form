<div class="jsf-cell-renderer">
  <div class="jsf-cell-input" [class.cell-error]="errorMessage && !showRequiredError()">
    @if (isCheckboxType()) {
      <jsf-checkbox-cell
        class="jsf-checkbox-cell"
        #jsfCheckboxCell
        [params]="params"
        (valueChanged)="rendererValueChanged($event)">
      </jsf-checkbox-cell>
    }
    @if (isDropdownType()) {
      <jsf-dropdown-cell
        class="jsf-dropdown-cell"
        #jsfDropdownCell
        [params]="params"
        (valueChanged)="rendererValueChanged($event)">
      </jsf-dropdown-cell>
    }
    @if (isTextType()) {
      <jsf-text-cell
        class="jsf-text-cell"
        #jsfTextCell
        [params]="params">
      </jsf-text-cell>
    }
    @if (errorMessage && !showRequiredError()) {
      <img
        class="jsf-error-cell"
        alt=""
        aria-hidden="true"
        [title]="errorMessage"
        [src]="'assets/jsf-images/exclamation.svg'">
    }
    @if (showRequiredError()) {
      <img
        class="jsf-error-cell-required"
        alt=""
        aria-hidden="true"
        [title]="errorMessage"
        [src]="'assets/jsf-images/exclamation.svg'">
    }
    @if (showRequiredError()) {
      <div
        class="jsf-required-cell-asterisk">
        *
      </div>
    }
  </div>
  <div>
    @if (showAddButton()) {
      <button
        class="btn btn-primary jsf-table-add-button"
        (click)="onAdd()">
        Add
      </button>
    }
  </div>
</div>

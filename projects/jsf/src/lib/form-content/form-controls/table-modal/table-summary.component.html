<div class="form-item-with-label">
  <jsf-label [formItem]="formItem()" [labelLengthClass]="labelLengthClass()"></jsf-label>
  <div class="form-item" [formGroup]="formGroup()">
    <div class="control-with-error array-input">
      <span>{{numItems}} Items</span>
      <div class="edit-btn">
        <button
          (click)="onEdit()"
          class="btn btn-primary">
          Edit
        </button>
      </div>
      @if (formItem().helpText) {
        <img
          class="help"
          [title]="formItem().helpText"
          [src]="'assets/jsf-images/info.svg'"
          alt="help">
      }
    </div>
  </div>
</div>

<jsf-modal-outlet [modalService]="modalService"></jsf-modal-outlet>

<div class="form-item-with-label">
  <jsf-label [formItem]="formItem()" [labelLengthClass]="labelLengthClass()"></jsf-label>
  <div class="form-item" [formGroup]="formGroup()">
    <div [class]="getClass()">
      <input
        class="form-control"
        autocomplete="new-password"
        [placeholder]="getStringDataItem().placeholder"
        [formControlName]="formItem().key"
        [id]="formItem().path"
        [type]="getInputType()"
        (blur)="onStringBlur()"
        (focus)="onFocus()">
      @if (showCounter) {
        <div class="character-counter">
          @if (hasMaxLength()) {
            <span class="max" [class.error]="hasMaxLengthError()">{{getMaxCharacterCountInfo()}}</span>
          }
          @if (hasMinLength()) {
            <span class="min" [class.error]="hasMinLengthError()">{{getMinCharacterCountInfo()}}</span>
          }
        </div>
      }
      @if (showError) {
        <div class="error-message">{{getErrorMessage()}}</div>
      }
    </div>
    @for (button of getStringDataItem().buttons; track button.key) {
      <div class="event-btns">
        <jsf-event-button
          [buttonData]="button"
          (buttonEvent)="onButtonEvent($event)"></jsf-event-button>
      </div>
    }
    @if (formItem().helpText) {
      <img
        class="help"
        alt="help"
        [title]="formItem().helpText"
        [src]="'assets/jsf-images/info.svg'">
    }
  </div>
</div>

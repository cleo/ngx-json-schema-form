<jsf-component
  [schemaData]="schemaData"
  [config]="config"
  [templates]="{ testTemplate1: testTemplate1 }"
  (disableSubmit)="updateSubmitButtonStatus($event)"
  (formHeightChange)="emitTotalHeight($event)"
  (buttonEvent)="buttonEvent($event)"
  (templateEvent)="templateEvent($event)">
</jsf-component>

@if (showValidationMessage) {
  <div
    class="validation"
    [ngClass]="isValid ? 'valid' : 'not-valid'">
    @if (isValid) {
      <p>Validation Successful!</p>
    }
    @if (!isValid) {
      <p>Validation NOT Successful!</p>
    }
  </div>
}

<div class="submit-row">
  <button class="btn btn-secondary"
    title="This will log the form."
    (click)="onLogForm()">Log Form</button>
  <button class="btn btn-secondary"
    title="This will log the form values from JSF without validating them."
    (click)="onLogFormValues()">Log Form Values</button>
  <button class="btn btn-secondary"
    title="This will reload the form."
    (click)="onCancel()">Cancel</button>
  <button class="btn btn-primary"
    title="This will validate the form."
    [disabled]="isSubmitDisabled"
    (click)="onSubmit()">Submit</button>
</div>

<ng-template #testTemplate1>
  <app-template-test></app-template-test>
</ng-template>
